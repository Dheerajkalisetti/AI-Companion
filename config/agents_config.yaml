# OmniCompanion — Agent Configuration
# All 7 agents with their operational parameters

agents:
  executive_planner:
    name: "Executive Planner"
    id: 1
    module: "src.orchestrator.agents.planner"
    class: "ExecutivePlannerAgent"
    enabled: true
    gemini:
      model: "gemini-3-flash"
      temperature: 0.1
      max_output_tokens: 4096
      response_format: "json"
    retry:
      max_attempts: 3
      backoff_multiplier: 2
      max_backoff_seconds: 30
    tools:
      - gemini_text
      - memory_read
    timeout_seconds: 60

  ui_vision:
    name: "UI Vision"
    id: 2
    module: "src.orchestrator.agents.vision"
    class: "UIVisionAgent"
    enabled: true
    gemini:
      model: "gemini-3-flash"
      temperature: 0.1
      max_output_tokens: 4096
      response_format: "json"
    ocr:
      engine: "tesseract"
      lang: "eng"
      config: "--psm 3"
    screenshot:
      max_dimension: 3072
      format: "png"
    retry:
      max_attempts: 3
      backoff_multiplier: 2
      max_backoff_seconds: 30
    tools:
      - gemini_multimodal
      - ocr
      - screen_capture
    timeout_seconds: 45

  action_executor:
    name: "Action Executor"
    id: 3
    module: "src.orchestrator.agents.executor"
    class: "ActionExecutorAgent"
    enabled: true
    grpc:
      host: "127.0.0.1"
      port: 50051
    retry:
      max_attempts: 2
      backoff_multiplier: 1
      max_backoff_seconds: 10
    tools:
      - screen_capture
      - mouse_keyboard
      - window_management
    timeout_seconds: 30

  browser_automation:
    name: "Browser Automation"
    id: 4
    module: "src.orchestrator.agents.browser"
    class: "BrowserAutomationAgent"
    enabled: true
    playwright:
      browser: "chromium"
      headless: false
      viewport:
        width: 1920
        height: 1080
      timeout_ms: 30000
    retry:
      max_attempts: 3
      backoff_multiplier: 2
      max_backoff_seconds: 15
    tools:
      - playwright
    timeout_seconds: 60

  memory:
    name: "Memory"
    id: 5
    module: "src.orchestrator.agents.memory"
    class: "MemoryAgent"
    enabled: true
    short_term:
      max_screen_history: 10
      max_task_history: 100
    long_term:
      firestore_collection_prefix: ""
      embedding_model: "text-embedding-004"
      embedding_dimensions: 768
    retrieval:
      semantic_weight: 0.7
      recency_weight: 0.3
      decay_rate: 0.05
      max_results: 5
    tools:
      - firestore_read
      - firestore_write
      - cloud_storage
      - gemini_embeddings
    timeout_seconds: 15

  verification:
    name: "Verification"
    id: 6
    module: "src.orchestrator.agents.verifier"
    class: "VerificationAgent"
    enabled: true
    gemini:
      model: "gemini-3-flash"
      temperature: 0.1
      max_output_tokens: 2048
      response_format: "json"
    confidence_threshold: 0.85
    retry:
      max_attempts: 2
      backoff_multiplier: 2
      max_backoff_seconds: 15
    tools:
      - gemini_multimodal
      - screen_capture
    timeout_seconds: 30

  safety_monitor:
    name: "Safety Monitor"
    id: 7
    module: "src.orchestrator.agents.safety"
    class: "SafetyMonitorAgent"
    enabled: true
    gemini:
      model: "gemini-3-flash"
      temperature: 0.0
      max_output_tokens: 1024
      response_format: "json"
    rules_file: "config/safety_rules.yaml"
    auto_approve_levels:
      - "low"
      - "medium"
    require_confirmation_levels:
      - "high"
      - "critical"
    tools:
      - gemini_text
      - safety_rules
    timeout_seconds: 10

# Orchestration settings
orchestration:
  max_retries_per_step: 3
  max_total_retries: 10
  step_timeout_seconds: 120
  task_timeout_seconds: 600
  log_level: "INFO"
  log_format: "json"
